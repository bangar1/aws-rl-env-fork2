      - command: aws s3api get-bucket-encryption --bucket analytics-raw
        output_contains: "AES256"
      - command: aws firehose describe-delivery-stream --delivery-stream-name clickstream-firehose
        output_contains: "raw/"
      - command: aws firehose describe-delivery-stream --delivery-stream-name clickstream-firehose
